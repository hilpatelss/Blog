<!doctype html>
<html lang="en">
  {% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    {% include "header.html" %}
    <div class="container-fluid  ">
        <div class="row p-5 row-cols-3  ">
            <form method="post" class="shadow-lg border m-auto mt-5  p-4">
                 {% csrf_token %}
                <div class="mb-3 mt-3 my-4">

                    <div class="input-group mb-3">
                        <input name="b_file" type="file" class="form-control" id="inputGroupFile02">

                    </div>

                </div>
                
                <div class="input-group mb-3 mt-3 my-4">
                    <span class="input-group-text">Title</span>
                    <textarea  name="b_title" style="height: 100px" class="form-control" aria-label="With textarea"></textarea>
                </div>
                <div class="input-group mb-3 mt-3 my-4">
                    <span class="input-group-text">heading</span>
                    <textarea  name="b_heading" class="form-control" aria-label="With textarea"></textarea>
                   

                </div>
                <div class="input-group mb-3 mt-3 my-4">
                    <span class="input-group-text">blog</span>
                    <textarea name="b_blog" style="height: 200px" class="form-control" aria-label="With textarea"></textarea>
                </div>


                <button type="submit" class="btn btn-primary mt-4">Submit</button>
            </form>
        </div>
    </div>

</body>

</html>
