<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    {% include "header.html" %}
    <div class="container-fluid  ">
        <div class="row p-5 row-cols-5  ">
            <form method="post" class="shadow-lg border m-auto mt-5  p-4">
                {% csrf_token %}
                <div class="mb-3 mt-3 my-4">

                    <input type="text" name="username" class="form-control" placeholder="username" id="exampleInputEmail1"
                        >
                    
                </div>
                <div class="mb-3 mt-4">

                    <input type="password" name="password" class="form-control" placeholder="Password" id="exampleInputPassword1">
                </div>
                
                <button type="submit" class="btn btn-primary mt-4">Sign In</button>
            </form>
        </div>
    </div>

</body>

</html>
