<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  </head>

  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% include 'header.html' %}
    <div class="container-fluid">
      <form action="" method="post">
      {% csrf_token %}
      <div class="row p-5 row-cols-2">
        
          {% for blog in blog %}
            <div class="col-2 m-3 p-5">
              <div class="shadow-lg card" style="width: 18rem;">
                
                <img src="{{ blog.b_img.url}}" style="width: 16rem; height: 16rem; margin: 1rem 0 0 1rem;" class="card-img-top" alt="...">
                <div class="card-body">
                  <h5 class="card-title">{{ blog.b_title }}</h5>
                  <p class="card-text">{{ blog.b_heading }}</p>
                  <button class="btn btn-success mx-1" name="link" type="submit" value="{{ blog.b_title }}">View</button>
                  
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
      </form>
    </div>
  </body>
</html>
