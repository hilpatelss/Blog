<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  </head>

  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% include 'header.html' %}
    <div class="container-fluid">
      <div class="row p-5">
        <div class="shadow-lg card m-auto mt-5" style="width: 60rem;">
           
          <img src="{{ blog.b_img.url}}" style="width: 55rem; height: 55rem; margin: 2.5rem 0 0 2.5rem;" class="card-img-top" alt="...">

          <div class="card-body">
            <h5 class="card-title">Title</h5>
            <p class="card-text">{{ blog.b_title }}</p>
            <h5 class="card-title">Heading</h5>
            <p class="card-text">{{ blog.b_heading }}</p>
            <h5 class="card-title">Blog</h5>
            <p class="card-text">{{ blog.b_blog }}</p>
          </div>
          
        </div>
      </div>
    </div>
  </body>
</html>
